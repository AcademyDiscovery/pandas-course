name: Repo ready

on:
  workflow_dispatch:

jobs:
  ready:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Confirm repository contents are present
        run: |
          echo "Repository is ready."
          echo "Default branch: ${GITHUB_REF_NAME}"
          test -f README.md || true
          ls -la